<div class="d-flex justify-content-between align-items-end mb-2">
    <div>
        <h1 class="fw-bold text-primary mb-0">Dashboard Proposal Skripsi</h1>
        <p class="text-muted mb-0">Menampilkan mahasiswa yang akan ujian proposal.</p>
    </div>
</div>

<hr class="text-secondary opacity-25 mb-4">

<div id="proposalSkripsiList" class="mt-3">
    <div class="text-center text-muted py-5">
        <div class="spinner-border text-primary mb-3" style="width: 3rem; height: 3rem;" role="status"></div>
        <h5>Memuat data...</h5>
    </div>
</div>

<div class="modal fade" id="modalFormArtikel" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content shadow">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title fw-bold" id="modalLabel"><i class="bi bi-journal-plus me-2"></i>Endorse Skripsi ke Artikel</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body bg-light">
                <form id="formArtikel">
                    <input type="hidden" id="recordId" name="recordId">
                    
                    <div class="card border-0 shadow-sm mb-3">
                        <div class="card-header bg-white fw-bold text-secondary">1. Identitas Artikel</div>
                        <div class="card-body row g-3">
                            <div class="col-md-12">
                                <label class="form-label fw-semibold">Judul Artikel <span class="text-danger">*</span></label>
                                <textarea class="form-control" id="judulArtikel" rows="2" required></textarea>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Tahun Target <span class="text-danger">*</span></label>
                                <select class="form-select" id="tahunTarget" required>
                                    <option value="" disabled selected>Pilih Tahun...</option>
                                    <option value="2026">2026</option><option value="2027">2027</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Rencana Submit <span class="text-danger">*</span></label>
                                <select class="form-select" id="rencanaSubmit" required onchange="updateDropdownOptions(this.value)">
                                    <option value="" disabled selected>Pilih Tipe...</option>
                                    <option value="Jurnal">Jurnal</option><option value="Prosiding">Prosiding</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Target Indeksasi <span class="text-danger">*</span></label>
                                <select class="form-select" id="targetIndeksasi" required disabled>
                                    <option value="">Pilih Rencana Submit Dulu</option>
                                </select>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label fw-semibold">Nama Jurnal / Prosiding Target</label>
                                <input type="text" class="form-control" id="namaJurnal">
                            </div>
                        </div>
                    </div>

                    <div class="card border-0 shadow-sm mb-3">
                        <div class="card-header bg-white fw-bold text-secondary d-flex justify-content-between align-items-center">
                            <span>2. Daftar Penulis (Internal Departemen)</span>
                            <button type="button" class="btn btn-sm btn-outline-primary" onclick="createAuthorRow()"><i class="bi bi-person-plus me-1"></i>Tambah Penulis</button>
                        </div>
                        <div class="card-body">
                            <div id="authorContainer" class="d-flex flex-column gap-2"></div>
                            <hr>
                            <div class="d-flex justify-content-between align-items-center mb-2 mt-3">
                                <span class="fw-bold text-secondary"><i class="bi bi-mortarboard me-2"></i>Keterlibatan Mahasiswa</span>
                                <button type="button" class="btn btn-sm btn-outline-success" onclick="createStudentRow()"><i class="bi bi-person-plus me-1"></i>Tambah Mahasiswa</button>
                            </div>
                            <div id="studentContainer" class="d-flex flex-column gap-2"></div>
                            <div id="emptyStudentText" class="text-muted small text-center mt-2 d-none">Belum ada mahasiswa.</div>
                        </div>
                    </div>

                    <div class="card border-0 shadow-sm mb-3">
                        <div class="card-header bg-white fw-bold text-secondary">3. Status Saat Ini</div>
                        <div class="card-body row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Status Terkini <span class="text-danger">*</span></label>
                                <select class="form-select border-primary" id="statusTerkini" required disabled>
                                    <option value="">Pilih Rencana Submit Dulu</option>
                                </select>
                            </div>
                            <div class="col-md-6 d-none" id="containerUrlPublish">
                                <label class="form-label fw-semibold text-success">URL Artikel Publish <span class="text-danger">*</span></label>
                                <input type="url" class="form-control border-success" id="urlPublish">
                            </div>
                            <div class="col-md-12">
                                <label class="form-label fw-semibold">Catatan / Kendala</label>
                                <textarea class="form-control" id="catatanKendala" rows="3"></textarea>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer bg-light">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                <button type="button" class="btn btn-primary fw-bold" onclick="handleSaveArtikel()"><i class="bi bi-send-check me-1"></i>Endorse Sekarang</button>
            </div>
        </div>
    </div>
</div>
